<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Homepage</title>

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />
  </head>
  <body>
    <heading class="hero">
      <div class="img-wrap">
        <img
          src="/imgs/ashley-williams.jpg"
          alt="Ashley Williams"
          class="hero-img"
        />
        <h1>Ashley Williams</h1>
      </div>
      <div class="hero-about">
        <h2>About Me</h2>
        <p>
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Rem
          quibusdam modi nobis aperiam, enim dolores, temporibus quasi repellat
          provident adipisci eveniet dolorum numquam obcaecati mollitia.
        </p>
        <div class="icon-container">
          <i class="devicon-github-original colored"></i>
          <i class="devicon-linkedin-plain"></i>
          <i class="devicon-twitter-original colored"></i>
        </div>
      </div>
    </heading>
    <main>
      <h3>My Work</h3>
      <section class="card">
        <div class="img-container">Screenshot of project</div>
        <div class="card-info">
          <h4>Project Name</h4>
          <div class="icon-container"></div>
        </div>
      </section>
    </main>
    <!-- Webpack will inject everything here -->
  </body>
</html>
